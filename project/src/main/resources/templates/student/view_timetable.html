<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Timetable - Student</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    .sidebar { min-height: 100vh; border-right: 1px solid #dee2e6; }
    .day-header { background-color: #fff3cd; font-weight: 700; }
  </style>
</head>
<body class="bg-light">

<header class="navbar navbar-dark bg-warning shadow sticky-top">
  <div class="container-fluid">
    <a class="navbar-brand fw-bold text-dark" th:href="@{/student/dashboard}">
      <i class="bi bi-mortarboard-fill me-2"></i>Student Panel
    </a>
    <form th:action="@{/logout}" method="post">
      <button type="submit" class="btn btn-dark btn-sm">
        <i class="bi bi-box-arrow-right me-1"></i>Logout
      </button>
    </form>
  </div>
</header>

<div class="container-fluid">
  <div class="row">

    <nav class="col-md-2 d-none d-md-block bg-white sidebar py-4 px-3">
      <ul class="nav flex-column gap-1">
        <li><a class="nav-link text-dark" th:href="@{/student/dashboard}"><i class="bi bi-speedometer2 me-2"></i>Dashboard</a></li>
        <li><a class="nav-link text-dark" th:href="@{/student/courses}"><i class="bi bi-book-fill me-2"></i>My Courses</a></li>
        <li><a class="nav-link text-dark" th:href="@{/student/attendance}"><i class="bi bi-calendar-check me-2"></i>Attendance</a></li>
        <li><a class="nav-link text-dark" th:href="@{/student/scores}"><i class="bi bi-bar-chart-fill me-2"></i>Exam Scores</a></li>
        <li><a class="nav-link text-dark" th:href="@{/student/fees}"><i class="bi bi-cash-stack me-2"></i>Fee Status</a></li>
        <li><a class="nav-link active text-warning fw-bold" th:href="@{/student/timetable}"><i class="bi bi-calendar3 me-2"></i>Timetable</a></li>
      </ul>
    </nav>

    <main class="col-md-10 px-4 py-4">
      <h4 class="fw-bold text-secondary mb-1">Class Timetable</h4>
      <p class="text-muted mb-4">
        Class <strong th:text="${student.classNumber}"></strong> — Section
        <strong th:text="${student.section}"></strong>
      </p>

      <div th:if="${!#lists.isEmpty(timetable)}">
        <!-- Group by day and display -->
        <div th:each="day : ${ {'Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'} }">

          <!-- Only show day block if there are slots for it -->
          <div th:with="daySlots=${timetable.stream().filter(t -> t.dayOfWeek == day).sorted(java.util.Comparator.comparingInt(t -> t.periodNumber)).toList()}"
               th:if="${!daySlots.isEmpty()}"
               class="card shadow-sm mb-3">
            <div class="card-header day-header">
              <i class="bi bi-calendar-week me-2"></i><span th:text="${day}"></span>
            </div>
            <div class="card-body p-0">
              <table class="table table-hover mb-0">
                <thead class="table-light">
                  <tr>
                    <th>Period</th>
                    <th>Time</th>
                    <th>Course</th>
                    <th>Faculty</th>
                    <th>Specialization</th>
                  </tr>
                </thead>
                <tbody>
                  <tr th:each="slot : ${daySlots}">
                    <td>
                      <span class="badge bg-warning text-dark"
                            th:text="'P' + ${slot.periodNumber}"></span>
                    </td>
                    <td th:text="${slot.timeSlot}"></td>
                    <td class="fw-bold" th:text="${slot.course.courseName}"></td>
                    <td th:text="${slot.faculty.user.name}"></td>
                    <td class="text-muted" th:text="${slot.faculty.specialization}"></td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>

        </div>
      </div>

      <!-- Empty State -->
      <div th:if="${#lists.isEmpty(timetable)}" class="text-center py-5 text-muted">
        <i class="bi bi-calendar-x fs-1 d-block mb-3"></i>
        <h6>No timetable assigned for your class yet.</h6>
        <p class="small">Please contact your admin.</p>
      </div>

    </main>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
