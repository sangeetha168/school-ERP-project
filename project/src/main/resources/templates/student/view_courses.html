<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>My Courses - Student</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <style>.sidebar { min-height: 100vh; border-right: 1px solid #dee2e6; }</style>
</head>
<body class="bg-light">

<header class="navbar navbar-dark bg-warning shadow sticky-top">
  <div class="container-fluid">
    <a class="navbar-brand fw-bold text-dark" th:href="@{/student/dashboard}">
      <i class="bi bi-mortarboard-fill me-2"></i>Student Panel
    </a>
    <form th:action="@{/logout}" method="post">
      <button type="submit" class="btn btn-dark btn-sm">
        <i class="bi bi-box-arrow-right me-1"></i>Logout
      </button>
    </form>
  </div>
</header>

<div class="container-fluid">
  <div class="row">

    <nav class="col-md-2 d-none d-md-block bg-white sidebar py-4 px-3">
      <ul class="nav flex-column gap-1">
        <li><a class="nav-link text-dark" th:href="@{/student/dashboard}"><i class="bi bi-speedometer2 me-2"></i>Dashboard</a></li>
        <li><a class="nav-link active text-warning fw-bold" th:href="@{/student/courses}"><i class="bi bi-book-fill me-2"></i>My Courses</a></li>
        <li><a class="nav-link text-dark" th:href="@{/student/attendance}"><i class="bi bi-calendar-check me-2"></i>Attendance</a></li>
        <li><a class="nav-link text-dark" th:href="@{/student/scores}"><i class="bi bi-bar-chart-fill me-2"></i>Exam Scores</a></li>
        <li><a class="nav-link text-dark" th:href="@{/student/fees}"><i class="bi bi-cash-stack me-2"></i>Fee Status</a></li>
        <li><a class="nav-link text-dark" th:href="@{/student/timetable}"><i class="bi bi-calendar3 me-2"></i>Timetable</a></li>
      </ul>
    </nav>

    <main class="col-md-10 px-4 py-4">
      <h4 class="fw-bold text-secondary mb-1">My Courses</h4>
      <p class="text-muted mb-4">
        Class <strong th:text="${student.classNumber}"></strong> — Section
        <strong th:text="${student.section}"></strong>
      </p>

      <!-- Course Cards -->
      <div class="row g-4" th:if="${!#lists.isEmpty(courses)}">
        <div class="col-md-4" th:each="course : ${courses}">
          <div class="card shadow border-0 h-100">
            <div class="card-body">
              <div class="d-flex align-items-center mb-3">
                <div class="bg-warning bg-opacity-25 rounded-circle p-3 me-3">
                  <i class="bi bi-book-fill text-warning fs-4"></i>
                </div>
                <div>
                  <h6 class="fw-bold mb-0" th:text="${course.courseName}"></h6>
                  <small class="text-muted">Class <span th:text="${course.classNumber}"></span></small>
                </div>
              </div>
              <hr>
              <div class="d-flex align-items-center">
                <i class="bi bi-person-circle text-secondary me-2"></i>
                <div>
                  <p class="mb-0 small fw-bold" th:text="${course.faculty.user.name}">Faculty</p>
                  <p class="mb-0 small text-muted" th:text="${course.faculty.specialization}">Specialization</p>
                </div>
              </div>
            </div>
            <div class="card-footer bg-transparent border-0 pt-0">
              <a th:href="@{/student/scores}" class="btn btn-sm btn-outline-warning w-100">
                <i class="bi bi-bar-chart me-1"></i>View My Score
              </a>
            </div>
          </div>
        </div>
      </div>

      <!-- Empty State -->
      <div th:if="${#lists.isEmpty(courses)}" class="text-center py-5 text-muted">
        <i class="bi bi-inbox fs-1 d-block mb-3"></i>
        <h6>No courses assigned to your class yet.</h6>
        <p class="small">Please contact your faculty or admin.</p>
      </div>

    </main>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
