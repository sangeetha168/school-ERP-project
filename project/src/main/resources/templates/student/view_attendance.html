<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>My Attendance - Student</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <style>.sidebar { min-height: 100vh; border-right: 1px solid #dee2e6; }</style>
</head>
<body class="bg-light">

<header class="navbar navbar-dark bg-warning shadow sticky-top">
  <div class="container-fluid">
    <a class="navbar-brand fw-bold text-dark" th:href="@{/student/dashboard}">
      <i class="bi bi-mortarboard-fill me-2"></i>Student Panel
    </a>
    <form th:action="@{/logout}" method="post">
      <button type="submit" class="btn btn-dark btn-sm">
        <i class="bi bi-box-arrow-right me-1"></i>Logout
      </button>
    </form>
  </div>
</header>

<div class="container-fluid">
  <div class="row">
    <nav class="col-md-2 d-none d-md-block bg-white sidebar py-4 px-3">
      <ul class="nav flex-column gap-1">
        <li><a class="nav-link text-dark" th:href="@{/student/dashboard}"><i class="bi bi-speedometer2 me-2"></i>Dashboard</a></li>
        <li><a class="nav-link text-dark" th:href="@{/student/courses}"><i class="bi bi-book-fill me-2"></i>My Courses</a></li>
        <li><a class="nav-link active text-warning fw-bold" th:href="@{/student/attendance}"><i class="bi bi-calendar-check me-2"></i>Attendance</a></li>
        <li><a class="nav-link text-dark" th:href="@{/student/scores}"><i class="bi bi-bar-chart-fill me-2"></i>Exam Scores</a></li>
        <li><a class="nav-link text-dark" th:href="@{/student/fees}"><i class="bi bi-cash-stack me-2"></i>Fee Status</a></li>
        <li><a class="nav-link text-dark" th:href="@{/student/timetable}"><i class="bi bi-calendar3 me-2"></i>Timetable</a></li>
      </ul>
    </nav>

    <main class="col-md-10 px-4 py-4">
      <h4 class="fw-bold text-secondary mb-4">My Attendance</h4>

      <!-- Summary Row -->
      <div class="row g-3 mb-4">
        <div class="col-md-4">
          <div class="card text-center border-0 shadow">
            <div class="card-body">
              <h6 class="text-muted">Attendance Percentage</h6>
              <h2 class="fw-bold text-success"
                  th:text="${#numbers.formatDecimal(attendancePercentage, 1, 1) + '%'}">0%</h2>
            </div>
          </div>
        </div>
        <div class="col-md-4">
          <div class="card text-center border-0 shadow">
            <div class="card-body">
              <h6 class="text-muted">Days Present</h6>
              <h2 class="fw-bold text-primary" th:text="${presentDays}">0</h2>
            </div>
          </div>
        </div>
        <div class="col-md-4">
          <div class="card text-center border-0 shadow">
            <div class="card-body">
              <h6 class="text-muted">Total Working Days</h6>
              <h2 class="fw-bold text-secondary" th:text="${totalDays}">0</h2>
            </div>
          </div>
        </div>
      </div>

      <!-- Attendance Records Table -->
      <div class="card shadow-sm">
        <div class="card-header bg-white fw-bold">Attendance Records</div>
        <div class="card-body p-0">
          <table class="table table-hover mb-0">
            <thead class="table-light">
              <tr>
                <th>#</th>
                <th>Date</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody>
              <tr th:each="record, iter : ${attendanceList}">
                <td th:text="${iter.count}"></td>
                <td th:text="${record.date}"></td>
                <td>
                  <span th:if="${record.present}" class="badge bg-success">Present</span>
                  <span th:unless="${record.present}" class="badge bg-danger">Absent</span>
                </td>
              </tr>
              <tr th:if="${#lists.isEmpty(attendanceList)}">
                <td colspan="3" class="text-center text-muted py-3">No attendance records yet.</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
