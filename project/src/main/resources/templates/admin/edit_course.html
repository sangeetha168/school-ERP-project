<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Edit Course - Admin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-light">

<header class="navbar navbar-dark bg-primary shadow sticky-top">
  <div class="container-fluid">
    <a class="navbar-brand fw-bold" th:href="@{/admin/dashboard}">
      <i class="bi bi-shield-lock-fill me-2"></i>Admin Panel
    </a>
    <form th:action="@{/logout}" method="post">
      <button type="submit" class="btn btn-outline-light btn-sm">
        <i class="bi bi-box-arrow-right me-1"></i>Logout
      </button>
    </form>
  </div>
</header>

<div class="container py-5" style="max-width: 600px;">
  <div class="d-flex align-items-center mb-4 gap-3">
    <a th:href="@{/admin/courses}" class="btn btn-outline-secondary btn-sm">
      <i class="bi bi-arrow-left me-1"></i>Back
    </a>
    <h4 class="fw-bold text-secondary mb-0">Edit Course</h4>
  </div>

  <div class="card shadow-sm">
    <div class="card-body">
      <form th:action="@{/admin/courses/update/{id}(id=${course.id})}" method="post">
        <div class="row g-3">
          <div class="col-md-8">
            <label class="form-label fw-bold">Course Name</label>
            <input type="text" class="form-control" name="courseName"
                   th:value="${course.courseName}" required>
          </div>
          <div class="col-md-4">
            <label class="form-label fw-bold">Class</label>
            <select class="form-select" name="classNumber" required>
              <option th:each="i : ${#numbers.sequence(1,10)}"
                      th:value="${i}" th:text="${i}"
                      th:selected="${i == course.classNumber}">
              </option>
            </select>
          </div>
          <div class="col-12">
            <label class="form-label fw-bold">Assigned Faculty</label>
            <select class="form-select" name="facultyId" required>
              <option th:each="f : ${facultyList}"
                      th:value="${f.id}"
                      th:text="${f.user.name} + ' (' + ${f.specialization} + ')'"
                      th:selected="${f.id == course.faculty.id}">
              </option>
            </select>
          </div>
          <div class="col-12 d-flex gap-2 mt-2">
            <button type="submit" class="btn btn-primary">
              <i class="bi bi-check-circle me-1"></i>Update Course
            </button>
            <a th:href="@{/admin/courses}" class="btn btn-outline-secondary">Cancel</a>
          </div>
        </div>
      </form>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
