<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Edit Faculty - Admin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-light">

<header class="navbar navbar-dark bg-primary shadow sticky-top">
  <div class="container-fluid">
    <a class="navbar-brand fw-bold" th:href="@{/admin/dashboard}">
      <i class="bi bi-shield-lock-fill me-2"></i>Admin Panel
    </a>
    <form th:action="@{/logout}" method="post">
      <button type="submit" class="btn btn-outline-light btn-sm">
        <i class="bi bi-box-arrow-right me-1"></i>Logout
      </button>
    </form>
  </div>
</header>

<div class="container py-5" style="max-width: 700px;">
  <div class="d-flex align-items-center mb-4 gap-3">
    <a th:href="@{/admin/faculty}" class="btn btn-outline-secondary btn-sm">
      <i class="bi bi-arrow-left me-1"></i>Back
    </a>
    <h4 class="fw-bold text-secondary mb-0">Edit Faculty</h4>
  </div>

  <div class="card shadow-sm">
    <div class="card-body">
      <form th:action="@{/admin/faculty/update/{id}(id=${faculty.id})}" method="post">
        <div class="row g-3">
          <div class="col-md-6">
            <label class="form-label fw-bold">Full Name</label>
            <input type="text" class="form-control" name="name"
                   th:value="${faculty.user.name}" required>
          </div>
          <div class="col-md-6">
            <label class="form-label fw-bold">Email
              <small class="text-muted fw-normal">(read-only)</small>
            </label>
            <input type="email" class="form-control bg-light"
                   th:value="${faculty.user.email}" readonly>
          </div>
          <div class="col-md-6">
            <label class="form-label fw-bold">Phone</label>
            <input type="text" class="form-control" name="phone"
                   th:value="${faculty.phone}">
          </div>
          <div class="col-md-6">
            <label class="form-label fw-bold">Specialization</label>
            <input type="text" class="form-control" name="specialization"
                   th:value="${faculty.specialization}" required>
          </div>
          <div class="col-12 d-flex gap-2 mt-2">
            <button type="submit" class="btn btn-primary">
              <i class="bi bi-check-circle me-1"></i>Update Faculty
            </button>
            <a th:href="@{/admin/faculty}" class="btn btn-outline-secondary">Cancel</a>
          </div>
        </div>
      </form>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
