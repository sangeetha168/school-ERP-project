<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Manage Faculty - Admin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <style>.sidebar { min-height: 100vh; border-right: 1px solid #dee2e6; }</style>
</head>
<body class="bg-light">

<header class="navbar navbar-dark bg-primary shadow sticky-top">
  <div class="container-fluid">
    <a class="navbar-brand fw-bold" th:href="@{/admin/dashboard}">
      <i class="bi bi-shield-lock-fill me-2"></i>Admin Panel
    </a>
    <form th:action="@{/logout}" method="post">
      <button type="submit" class="btn btn-outline-light btn-sm">
        <i class="bi bi-box-arrow-right me-1"></i>Logout
      </button>
    </form>
  </div>
</header>

<div class="container-fluid">
  <div class="row">
    <nav class="col-md-2 d-none d-md-block bg-white sidebar py-4 px-3">
      <ul class="nav flex-column gap-1">
        <li><a class="nav-link text-dark" th:href="@{/admin/dashboard}"><i class="bi bi-speedometer2 me-2"></i>Dashboard</a></li>
        <li><a class="nav-link text-dark" th:href="@{/admin/students}"><i class="bi bi-people-fill me-2"></i>Students</a></li>
        <li><a class="nav-link active text-primary fw-bold" th:href="@{/admin/faculty}"><i class="bi bi-person-badge-fill me-2"></i>Faculty</a></li>
        <li><a class="nav-link text-dark" th:href="@{/admin/courses}"><i class="bi bi-book-fill me-2"></i>Courses</a></li>
        <li><a class="nav-link text-dark" th:href="@{/admin/timetable}"><i class="bi bi-calendar3 me-2"></i>Timetable</a></li>
        <li><a class="nav-link text-dark" th:href="@{/admin/fees}"><i class="bi bi-cash-stack me-2"></i>Fees</a></li>
      </ul>
    </nav>

    <main class="col-md-10 px-4 py-4">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="fw-bold text-secondary mb-0">Manage Faculty</h4>
        <button class="btn btn-success" type="button" data-bs-toggle="collapse" data-bs-target="#addFacultyForm">
          <i class="bi bi-plus-circle me-1"></i>Add Faculty
        </button>
      </div>

      <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
        <span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>
      <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
        <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>

      <!-- Add Faculty Form -->
      <div class="collapse mb-4" id="addFacultyForm">
        <div class="card card-body shadow-sm">
          <h6 class="fw-bold mb-3">New Faculty Details</h6>
          <form th:action="@{/admin/faculty/add}" method="post">
            <div class="row g-3">
              <div class="col-md-3">
                <label class="form-label">Full Name</label>
                <input type="text" class="form-control" name="name" required>
              </div>
              <div class="col-md-3">
                <label class="form-label">Email</label>
                <input type="email" class="form-control" name="email" required>
              </div>
              <div class="col-md-3">
                <label class="form-label">Phone</label>
                <input type="text" class="form-control" name="phone">
              </div>
              <div class="col-md-3">
                <label class="form-label">Specialization</label>
                <input type="text" class="form-control" name="specialization" required>
              </div>
              <div class="col-md-3 d-flex align-items-end">
                <button type="submit" class="btn btn-primary w-100">
                  <i class="bi bi-check-circle me-1"></i>Add Faculty
                </button>
              </div>
            </div>
          </form>
        </div>
      </div>

      <!-- Faculty Table -->
      <div class="card shadow-sm">
        <div class="card-body p-0">
          <table class="table table-hover mb-0">
            <thead class="table-dark">
              <tr>
                <th>Name</th>
                <th>Specialization</th>
                <th>Email</th>
                <th>Phone</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody>
              <tr th:each="faculty : ${facultyList}">
                <!-- Name and email are on faculty.user, NOT directly on faculty -->
                <td th:text="${faculty.user.name}"></td>
                <td th:text="${faculty.specialization}"></td>
                <td th:text="${faculty.user.email}"></td>
                <td th:text="${faculty.phone}"></td>
                <td>
                  <a th:href="@{/admin/faculty/edit/{id}(id=${faculty.id})}"
                     class="btn btn-sm btn-warning me-1">
                    <i class="bi bi-pencil"></i>
                  </a>
                  <a th:href="@{/admin/faculty/delete/{id}(id=${faculty.id})}"
                     class="btn btn-sm btn-danger"
                     onclick="return confirm('Delete this faculty member?')">
                    <i class="bi bi-trash"></i>
                  </a>
                </td>
              </tr>
              <tr th:if="${#lists.isEmpty(facultyList)}">
                <td colspan="5" class="text-center text-muted py-4">No faculty members yet.</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
