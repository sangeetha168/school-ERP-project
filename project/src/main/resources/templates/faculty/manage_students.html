<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Manage Students - Faculty</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

  <style>
    .sidebar {
      min-height: 100vh;
      border-right: 1px solid #dee2e6;
    }
  </style>
</head>

<body class="bg-light">

<!-- Navbar -->
<header class="navbar navbar-dark bg-success shadow sticky-top">
  <div class="container-fluid">
    <a class="navbar-brand fw-bold" th:href="@{/faculty/dashboard}">
      <i class="bi bi-person-badge-fill me-2"></i>Faculty Panel
    </a>
    <form th:action="@{/logout}" method="post">
      <button type="submit" class="btn btn-outline-light btn-sm">
        <i class="bi bi-box-arrow-right me-1"></i>Logout
      </button>
    </form>
  </div>
</header>

<div class="container-fluid">
  <div class="row">

    <!-- Sidebar -->
    <nav class="col-md-2 d-none d-md-block bg-white sidebar py-4 px-3">
      <ul class="nav flex-column gap-1">
        <li><a class="nav-link text-dark" th:href="@{/faculty/dashboard}">Dashboard</a></li>
        <li><a class="nav-link active text-success fw-bold" th:href="@{/faculty/students}">Students</a></li>
        <li><a class="nav-link text-dark" th:href="@{/faculty/attendance}">Attendance</a></li>
        <li><a class="nav-link text-dark" th:href="@{/faculty/scores}">Exam Scores</a></li>
        <li><a class="nav-link text-dark" th:href="@{/faculty/fees}">Fee Status</a></li>
      </ul>
    </nav>

    <!-- Main -->
    <main class="col-md-10 px-4 py-4">

      <h4 class="fw-bold text-secondary mb-3">Manage Students</h4>

      <!-- Alerts -->
      <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
      <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

      <!-- Add Student -->
      <div class="card shadow-sm mb-4">
        <div class="card-body">
          <h6 class="fw-bold mb-3">Add Student</h6>

          <!-- ✅ FIXED FORM -->
          <form th:action="@{/faculty/students/add}" method="post">

            <!-- ✅ CSRF TOKEN (VERY IMPORTANT) -->
            <input type="hidden"
                   th:name="${_csrf.parameterName}"
                   th:value="${_csrf.token}" />

            <div class="row g-3">

              <div class="col-md-3">
                <input type="text" class="form-control" name="name" placeholder="Full Name" required>
              </div>

              <div class="col-md-3">
                <input type="email" class="form-control" name="email" placeholder="Email" required>
              </div>

              <div class="col-md-2">
                <input type="text" class="form-control" name="phone" placeholder="Phone">
              </div>

              <div class="col-md-2">
                <select name="classNumber" class="form-select" required>
                  <option value="">Class</option>
                  <option th:each="course : ${myCourses}"
                          th:value="${course.classNumber}"
                          th:text="'Class ' + ${course.classNumber}">
                  </option>
                </select>
              </div>

              <div class="col-md-1">
                <input type="text" class="form-control" name="section" value="A" required>
              </div>

              <div class="col-md-1">
                <input type="text" class="form-control" name="rollNumber" placeholder="Roll" required>
              </div>

              <div class="col-md-12">
                <button type="submit" class="btn btn-success">
                  Add Student
                </button>
              </div>

            </div>
          </form>
        </div>
      </div>

      <!-- Students Table -->
      <div class="card shadow-sm">
        <div class="card-body p-0">

          <table class="table table-hover mb-0">
            <thead class="table-dark">
              <tr>
                <th>Roll</th>
                <th>Name</th>
                <th>Class</th>
                <th>Section</th>
                <th>Phone</th>
                <th>Email</th>
                <th>Actions</th>
              </tr>
            </thead>

            <tbody>

              <tr th:each="student : ${students}">
                <td th:text="${student.rollNumber}"></td>

                <!-- ✅ SAFE NULL CHECK -->
                <td th:text="${student.user != null ? student.user.name : 'N/A'}"></td>

                <td th:text="${student.classNumber}"></td>
                <td th:text="${student.section}"></td>
                <td th:text="${student.phone}"></td>

                <td th:text="${student.user != null ? student.user.email : 'N/A'}"></td>

                <td>
                  <a th:href="@{/faculty/students/edit/{id}(id=${student.id})}"
                     class="btn btn-sm btn-warning">Edit</a>

                  <a th:href="@{/faculty/students/delete/{id}(id=${student.id})}"
                     class="btn btn-sm btn-danger"
                     onclick="return confirm('Delete student?')">Delete</a>
                </td>
              </tr>

              <tr th:if="${#lists.isEmpty(students)}">
                <td colspan="7" class="text-center text-muted py-3">
                  No students found
                </td>
              </tr>

            </tbody>
          </table>

        </div>
      </div>

    </main>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
