<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Manage Attendance</title>

    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            background: #f4f6f9;
        }

        .container {
            width: 90%;
            margin: 30px auto;
        }

        h2 {
            text-align: center;
            color: #333;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .btn {
            padding: 8px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        .btn-back {
            background-color: #6c757d;
            color: white;
        }

        .btn-back:hover {
            background-color: #5a6268;
        }

        .btn-load {
            background-color: #007bff;
            color: white;
        }

        .btn-load:hover {
            background-color: #0056b3;
        }

        .btn-save {
            background-color: #28a745;
            color: white;
        }

        .btn-save:hover {
            background-color: #1e7e34;
        }

        select {
            padding: 6px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        table {
            border-collapse: collapse;
            width: 100%;
            background: white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        th {
            background-color: #007bff;
            color: white;
        }

        th, td {
            padding: 12px;
            text-align: center;
        }

        tr:nth-child(even) {
            background-color: #f2f2f2;
        }

        tr:hover {
            background-color: #e9ecef;
        }

        .no-data {
            text-align: center;
            margin-top: 20px;
            color: #555;
            font-size: 16px;
        }
    </style>
</head>

<body>

<div class="container">

    <!-- 🔥 TOP BAR -->
    <div class="top-bar">
        <h2>Manage Attendance</h2>

        <!-- ✅ BACK BUTTON -->
        <a th:href="@{/faculty/dashboard}">
            <button class="btn btn-back">⬅ Back to Dashboard</button>
        </a>
    </div>

    <!-- ✅ CLASS SELECT -->
    <form method="get" th:action="@{/attendance}">
        <label>Select Class:</label>
        <select name="classNumber" required>
            <option value="">-- Select Class --</option>
            <option th:each="cls : ${classNumbers}"
                    th:value="${cls}"
                    th:text="${cls}"
                    th:selected="${cls == selectedClass}">
            </option>
        </select>
        <button type="submit" class="btn btn-load">Load Students</button>
    </form>

    <br>

    <!-- ✅ STUDENTS TABLE -->
    <div th:if="${students != null}">
        <h3 th:text="'Class ' + ${selectedClass} + ' Attendance (' + ${today} + ')'"></h3>

        <table>
            <thead>
                <tr>
                    <th>Roll No</th>
                    <th>Name</th>
                    <th>Attendance %</th>
                    <th>Mark Attendance</th>
                </tr>
            </thead>

            <tbody>
                <tr th:each="student : ${students}">
                    <td th:text="${student.rollNumber}"></td>
                    <td th:text="${student.name}"></td>

                    <td th:text="${attendanceMap[student.id]} + '%'"></td>

                    <td>
                        <form th:action="@{/attendance/mark}" method="post">
                            <input type="hidden" name="studentId" th:value="${student.id}" />
                            <input type="hidden" name="classNumber" th:value="${selectedClass}" />

                            <select name="present">
                                <option value="true">Present</option>
                                <option value="false">Absent</option>
                            </select>

                            <button type="submit" class="btn btn-save">Save</button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- ✅ NO DATA -->
    <div th:if="${students == null}" class="no-data">
        <p>Please select a class to view students.</p>
    </div>

</div>

</body>
</html>
