<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Edit Student - Faculty</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-light">

<header class="navbar navbar-dark bg-success shadow sticky-top">
  <div class="container-fluid">
    <a class="navbar-brand fw-bold" th:href="@{/faculty/dashboard}">
      <i class="bi bi-person-badge-fill me-2"></i>Faculty Panel
    </a>
    <form th:action="@{/logout}" method="post">
      <button type="submit" class="btn btn-outline-light btn-sm">
        <i class="bi bi-box-arrow-right me-1"></i>Logout
      </button>
    </form>
  </div>
</header>

<div class="container py-5" style="max-width: 700px;">
  <div class="d-flex align-items-center mb-4 gap-3">
    <a th:href="@{/faculty/students}" class="btn btn-outline-secondary btn-sm">
      <i class="bi bi-arrow-left me-1"></i>Back
    </a>
    <h4 class="fw-bold text-secondary mb-0">Edit Student</h4>
  </div>

  <div class="card shadow-sm">
    <div class="card-body">
      <form th:action="@{/faculty/students/update/{id}(id=${student.id})}" method="post">
        <div class="row g-3">
          <div class="col-md-6">
            <label class="form-label fw-bold">Full Name</label>
            <input type="text" class="form-control" name="name"
                   th:value="${student.user.name}" required>
          </div>
          <div class="col-md-6">
            <label class="form-label fw-bold">Email
              <small class="text-muted fw-normal">(read-only)</small>
            </label>
            <input type="email" class="form-control bg-light"
                   th:value="${student.user.email}" readonly>
          </div>
          <div class="col-md-4">
            <label class="form-label fw-bold">Phone</label>
            <input type="text" class="form-control" name="phone"
                   th:value="${student.phone}">
          </div>
          <div class="col-md-2">
            <label class="form-label fw-bold">Class</label>
            <select class="form-select" name="classNumber" required>
              <option th:each="i : ${#numbers.sequence(1,10)}"
                      th:value="${i}" th:text="${i}"
                      th:selected="${i == student.classNumber}">
              </option>
            </select>
          </div>
          <div class="col-md-2">
            <label class="form-label fw-bold">Section</label>
            <input type="text" class="form-control" name="section"
                   th:value="${student.section}" required>
          </div>
          <div class="col-md-4">
            <label class="form-label fw-bold">Roll Number</label>
            <input type="text" class="form-control" name="rollNumber"
                   th:value="${student.rollNumber}" required>
          </div>
          <div class="col-12 d-flex gap-2 mt-2">
            <button type="submit" class="btn btn-success">
              <i class="bi bi-check-circle me-1"></i>Update Student
            </button>
            <a th:href="@{/faculty/students}" class="btn btn-outline-secondary">Cancel</a>
          </div>
        </div>
      </form>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
