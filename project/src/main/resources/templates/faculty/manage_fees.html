<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Fee Status - Faculty</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <style>.sidebar { min-height: 100vh; border-right: 1px solid #dee2e6; }</style>
</head>
<body class="bg-light">

<header class="navbar navbar-dark bg-success shadow sticky-top">
  <div class="container-fluid">
    <a class="navbar-brand fw-bold" th:href="@{/faculty/dashboard}">
      <i class="bi bi-person-badge-fill me-2"></i>Faculty Panel
    </a>
    <form th:action="@{/logout}" method="post">
      <button type="submit" class="btn btn-outline-light btn-sm">
        <i class="bi bi-box-arrow-right me-1"></i>Logout
      </button>
    </form>
  </div>
</header>

<div class="container-fluid">
  <div class="row">

    <nav class="col-md-2 d-none d-md-block bg-white sidebar py-4 px-3">
      <ul class="nav flex-column gap-1">
        <li><a class="nav-link text-dark" th:href="@{/faculty/dashboard}"><i class="bi bi-speedometer2 me-2"></i>Dashboard</a></li>
        <li><a class="nav-link text-dark" th:href="@{/faculty/students}"><i class="bi bi-people-fill me-2"></i>Students</a></li>
        <li><a class="nav-link text-dark" th:href="@{/faculty/attendance}"><i class="bi bi-calendar-check me-2"></i>Attendance</a></li>
        <li><a class="nav-link text-dark" th:href="@{/faculty/scores}"><i class="bi bi-clipboard-data me-2"></i>Exam Scores</a></li>
        <li><a class="nav-link active text-success fw-bold" th:href="@{/faculty/fees}"><i class="bi bi-cash-stack me-2"></i>Fee Status</a></li>
      </ul>
    </nav>

    <main class="col-md-10 px-4 py-4">
      <h4 class="fw-bold text-secondary mb-4">Student Fee Status</h4>

      <!-- Alerts -->
      <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
        <span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>
      <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
        <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>

      <!-- Class Filter -->
      <div class="card shadow-sm mb-4">
        <div class="card-body">
          <form th:action="@{/faculty/fees}" method="get" class="row g-3 align-items-end">
            <div class="col-md-4">
              <label class="form-label fw-bold">Select Class</label>
              <select class="form-select" name="classNumber">
                <option value="" disabled selected>Choose a class</option>
                <option th:each="course : ${myCourses}"
                        th:value="${course.classNumber}"
                        th:text="'Class ' + ${course.classNumber} + ' — ' + ${course.courseName}"
                        th:selected="${course.classNumber == selectedClass}">
                </option>
              </select>
            </div>
            <div class="col-md-2">
              <button type="submit" class="btn btn-success w-100">
                <i class="bi bi-search me-1"></i>Load
              </button>
            </div>
          </form>
        </div>
      </div>

      <!-- Fee Table -->
      <div class="card shadow-sm" th:if="${students != null}">
        <div class="card-header bg-white fw-bold">
          Class <span th:text="${selectedClass}"></span> — Fee Overview
        </div>
        <div class="card-body p-0">
          <table class="table table-hover align-middle mb-0">
            <thead class="table-dark">
              <tr>
                <th>Roll No.</th>
                <th>Student Name</th>
                <th>Total (₹)</th>
                <th>Paid (₹)</th>
                <th>Balance (₹)</th>
                <th>Status</th>
                <th>Record Payment</th>
              </tr>
            </thead>
            <tbody>
              <tr th:each="student : ${students}">
                <th:block th:with="fee=${feeMap[student.id]}">
                  <td th:text="${student.rollNumber}"></td>
                  <td th:text="${student.user.name}"></td>

                  <td th:text="${fee != null ? fee.totalAmount : 'N/A'}"></td>
                  <td th:text="${fee != null ? fee.paidAmount : 'N/A'}"></td>
                  <td>
                    <span th:if="${fee != null}"
                          th:text="'₹' + ${fee.totalAmount - fee.paidAmount}"
                          th:class="${fee.cleared} ? 'text-success fw-bold' : 'text-danger fw-bold'">
                    </span>
                    <span th:unless="${fee != null}" class="text-muted">—</span>
                  </td>
                  <td>
                    <span th:if="${fee != null and fee.cleared}" class="badge bg-success">Cleared</span>
                    <span th:if="${fee != null and !fee.cleared}" class="badge bg-danger">Pending</span>
                    <span th:unless="${fee != null}" class="badge bg-secondary">No Record</span>
                  </td>
                  <td>
                    <form th:if="${fee != null and !fee.cleared}"
                          th:action="@{/faculty/fees/update/{id}(id=${student.id})}"
                          method="post" class="d-flex gap-2 align-items-center">
                      <input type="hidden" name="classNumber" th:value="${selectedClass}">
                      <input type="number" class="form-control form-control-sm"
                             name="amountPaid" placeholder="Amount" min="1"
                             style="width: 110px" required>
                      <button type="submit" class="btn btn-sm btn-primary">
                        <i class="bi bi-check-lg"></i> Pay
                      </button>
                    </form>
                    <span th:if="${fee != null and fee.cleared}" class="text-success small">
                      <i class="bi bi-check-circle-fill"></i> Fully Paid
                    </span>
                    <span th:unless="${fee != null}" class="text-muted small">No fee record</span>
                  </td>
                </th:block>
              </tr>
              <tr th:if="${#lists.isEmpty(students)}">
                <td colspan="7" class="text-center text-muted py-4">
                  <i class="bi bi-inbox fs-3 d-block mb-2"></i>
                  No students found for this class.
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

    </main>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
