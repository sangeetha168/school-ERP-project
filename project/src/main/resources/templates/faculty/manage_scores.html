<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Exam Scores - Faculty</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

  <style>
    .sidebar {
      min-height: 100vh;
      border-right: 1px solid #dee2e6;
    }
  </style>
</head>

<body class="bg-light">

<!-- Navbar -->
<header class="navbar navbar-dark bg-success shadow sticky-top">
  <div class="container-fluid">
    <a class="navbar-brand fw-bold" th:href="@{/faculty/dashboard}">
      <i class="bi bi-person-badge-fill me-2"></i>Faculty Panel
    </a>
    <form th:action="@{/logout}" method="post">
      <button type="submit" class="btn btn-outline-light btn-sm">
        <i class="bi bi-box-arrow-right me-1"></i>Logout
      </button>
    </form>
  </div>
</header>

<div class="container-fluid">
  <div class="row">

    <!-- Sidebar -->
    <nav class="col-md-2 d-none d-md-block bg-white sidebar py-4 px-3">
      <ul class="nav flex-column gap-1">
        <li><a class="nav-link text-dark" th:href="@{/faculty/dashboard}">
          <i class="bi bi-speedometer2 me-2"></i>Dashboard</a></li>

        <li><a class="nav-link text-dark" th:href="@{/faculty/students}">
          <i class="bi bi-people-fill me-2"></i>Students</a></li>

        <li><a class="nav-link text-dark" th:href="@{/faculty/attendance}">
          <i class="bi bi-calendar-check me-2"></i>Attendance</a></li>

        <li><a class="nav-link active text-success fw-bold" th:href="@{/faculty/scores}">
          <i class="bi bi-clipboard-data me-2"></i>Exam Scores</a></li>

        <li><a class="nav-link text-dark" th:href="@{/faculty/fees}">
          <i class="bi bi-cash-stack me-2"></i>Fee Status</a></li>
      </ul>
    </nav>

    <!-- Main Content -->
    <main class="col-md-10 px-4 py-4">

      <h4 class="fw-bold text-secondary mb-4">Manage Exam Scores</h4>

      <!-- Alerts -->
      <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
        <span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>

      <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
        <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>

      <!-- Course Filter -->
      <div class="card shadow-sm mb-4">
        <div class="card-body">
          <form th:action="@{/faculty/scores}" method="get" class="row g-3 align-items-end">

            <div class="col-md-5">
              <label class="form-label fw-bold">Select Course</label>
              <select class="form-select" name="courseId">

                <option value="" disabled th:selected="${selectedCourse == null}">
                  Choose a course
                </option>

                <option th:each="course : ${myCourses}"
                        th:value="${course.id}"
                        th:text="${course.courseName} + ' (Class ' + ${course.classNumber} + ')'"
                        th:selected="${selectedCourse != null and course.id == selectedCourse.id}">
                </option>

              </select>
            </div>

            <div class="col-md-2">
              <button type="submit" class="btn btn-success w-100">
                <i class="bi bi-search me-1"></i>Load Scores
              </button>
            </div>

          </form>
        </div>
      </div>

      <!-- Scores Table -->
      <div class="card shadow-sm" th:if="${students != null}">
        <div class="card-header bg-white fw-bold">
          <span th:text="${selectedCourse.courseName}"></span> —
          Class <span th:text="${selectedCourse.classNumber}"></span>
        </div>

        <div class="card-body p-0">
          <table class="table table-hover mb-0">

            <thead class="table-dark">
              <tr>
                <th>Roll No.</th>
                <th>Student Name</th>
                <th>Marks</th>
                <th>Max Marks</th>
                <th>Grade</th>
                <th>Update Score</th>
              </tr>
            </thead>

            <tbody>

              <tr th:each="student : ${students}">

                <td th:text="${student.rollNumber}"></td>
                <td th:text="${student.user.name}"></td>

                <!-- Marks -->
                <td th:text="${scoreMap[student.id] != null ? scoreMap[student.id].marks : '-'}"></td>

                <!-- Max Marks -->
                <td th:text="${scoreMap[student.id] != null ? scoreMap[student.id].maxMarks : '-'}"></td>

                <!-- Grade -->
                <td>
                  <span th:if="${scoreMap[student.id] != null}"
                        th:text="${scoreMap[student.id].grade}"
                        th:classappend="${scoreMap[student.id].grade == 'F'} ? 'badge bg-danger' : 'badge bg-success'">
                  </span>

                  <span th:unless="${scoreMap[student.id] != null}" class="text-muted">—</span>
                </td>

                <!-- Update Form -->
                <td>
                  <form th:action="@{/faculty/scores/save}" method="post"
                        class="d-flex gap-2 align-items-center">

                    <input type="hidden" name="studentId" th:value="${student.id}">
                    <input type="hidden" name="courseId" th:value="${selectedCourse.id}">

                    <input type="number" class="form-control form-control-sm"
                           name="marks"
                           th:value="${scoreMap[student.id] != null ? scoreMap[student.id].marks : ''}"
                           placeholder="Marks" step="0.5" style="width:90px" required>

                    <input type="number" class="form-control form-control-sm"
                           name="maxMarks"
                           th:value="${scoreMap[student.id] != null ? scoreMap[student.id].maxMarks : 100}"
                           placeholder="Max" step="0.5" style="width:80px" required>

                    <button type="submit" class="btn btn-sm btn-primary">
                      Save
                    </button>

                  </form>
                </td>

              </tr>

              <tr th:if="${#lists.isEmpty(students)}">
                <td colspan="6" class="text-center text-muted py-3">
                  No students found.
                </td>
              </tr>

            </tbody>

          </table>
        </div>
      </div>

    </main>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
